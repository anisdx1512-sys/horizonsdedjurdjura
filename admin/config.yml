backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "activities"
    label: "الأنشطة"
    folder: "content/activities"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "العنوان", name: "title", widget: "string"}
      - {label: "الصورة", name: "thumbnail", widget: "image"}
      - {label: "التفاصيل", name: "body", widget: "markdown"}
